[package]
name = "ghx"
version = "0.2.0"
edition = "2024"
description = "Multi-account GitHub CLI, powered by gh"
license = "MIT"
repository = "https://github.com/ichi0g0y/ghx"
readme = "README.md"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_yml = "0.0.12"
dirs = "6"
colored = "3"
serde_json = "1"
ureq = { version = "3", features = ["json"] }

[build-dependencies]
time = "0.3"
