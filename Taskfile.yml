version: "3"

tasks:
  build:
    desc: ワークスペース全体のリリースビルド
    cmds:
      - cargo build --release --workspace

  test:
    desc: ワークスペース全体のテスト実行
    cmds:
      - cargo test --workspace

  dev:ghx:
    desc: ghx の開発用ビルド＆実行 (引数はそのまま渡される)
    cmds:
      - cargo run -p ghx -- {{.CLI_ARGS}}

  release:ghx:
    desc: origin/main を検証して ghx-v$VERSION タグを作成して push
    vars:
      VERSION:
        sh: git fetch origin main >/dev/null 2>&1 && git show FETCH_HEAD:crates/ghx/Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/'
    preconditions:
      - sh: 'test -z "$(git ls-remote --tags origin refs/tags/ghx-v{{.VERSION}} 2>/dev/null)"'
        msg: リモートに同名タグが既に存在します
    cmds:
      - |
        set -eu
        tmpdir="$(mktemp -d "${TMPDIR:-/tmp}/ghx-release.XXXXXX")"
        cleanup() {
          git worktree remove --force "$tmpdir" >/dev/null 2>&1 || true
          rm -rf "$tmpdir"
        }
        trap cleanup EXIT

        git fetch origin main
        git worktree add --detach "$tmpdir" origin/main >/dev/null
        (
          cd "$tmpdir"
          cargo test -p ghx
        )
        git tag -f "ghx-v{{.VERSION}}" origin/main
        git push origin "ghx-v{{.VERSION}}"
