version: "3"

tasks:
  build:
    desc: リリースビルド
    cmds:
      - cargo build --release

  test:
    desc: テスト実行
    cmds:
      - cargo test

  dev:
    desc: 開発用ビルド＆実行 (引数はそのまま渡される)
    cmds:
      - cargo run -- {{.CLI_ARGS}}

  release:main:
    desc: origin/main を検証してリリースタグを作成して push
    vars:
      VERSION:
        sh: git fetch origin main >/dev/null 2>&1 && git show FETCH_HEAD:Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/'
    preconditions:
      - sh: '! git ls-remote --exit-code --tags origin "refs/tags/v{{.VERSION}}" >/dev/null 2>&1'
        msg: リモートに同名タグが既に存在します
    cmds:
      - |
        set -eu
        tmpdir="$(mktemp -d "${TMPDIR:-/tmp}/ghx-release.XXXXXX")"
        cleanup() {
          git worktree remove --force "$tmpdir" >/dev/null 2>&1 || true
          rm -rf "$tmpdir"
        }
        trap cleanup EXIT

        git fetch origin main
        git worktree add --detach "$tmpdir" origin/main >/dev/null
        (
          cd "$tmpdir"
          cargo test
        )
        git tag -f "v{{.VERSION}}" origin/main
        git push origin "v{{.VERSION}}"
