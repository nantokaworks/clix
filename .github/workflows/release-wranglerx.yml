name: Release wranglerx

on:
  push:
    tags:
      - "wranglerx-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Compute version
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#wranglerx-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release -p wranglerx --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../wranglerx-v${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz wranglerx
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../wranglerx-v${{ steps.version.outputs.version }}-${{ matrix.target }}.zip wranglerx.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wranglerx-${{ matrix.target }}
          path: wranglerx-v${{ steps.version.outputs.version }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#wranglerx-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Compute SHA256
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd artifacts
          for f in wranglerx-v*; do
            sha256sum "$f"
          done | tee ../checksums.txt

          echo "sha_macos_arm=$(sha256sum wranglerx-v${VERSION}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_macos_x86=$(sha256sum wranglerx-v${VERSION}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_arm=$(sha256sum wranglerx-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x86=$(sha256sum wranglerx-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_windows_x86=$(sha256sum wranglerx-v${VERSION}-x86_64-pc-windows-msvc.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
            checksums.txt

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA_MACOS_ARM: ${{ steps.sha.outputs.sha_macos_arm }}
          SHA_MACOS_X86: ${{ steps.sha.outputs.sha_macos_x86 }}
          SHA_LINUX_ARM: ${{ steps.sha.outputs.sha_linux_arm }}
          SHA_LINUX_X86: ${{ steps.sha.outputs.sha_linux_x86 }}
        run: |
          BASE_URL="https://github.com/ichi0g0y/clix/releases/download/${TAG}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ichi0g0y/homebrew-tap.git" homebrew-tap
          mkdir -p homebrew-tap/Formula

          printf '%s\n' \
            'class Wranglerx < Formula' \
            '  desc "Multi-account Cloudflare Wrangler CLI, powered by wrangler"' \
            '  homepage "https://github.com/ichi0g0y/clix"' \
            '  license "MIT"' \
            "  version \"${VERSION}\"" \
            '' \
            '  livecheck do' \
            '    url :stable' \
            '    strategy :github_latest' \
            '  end' \
            '' \
            '  on_macos do' \
            '    on_arm do' \
            "      url \"${BASE_URL}/wranglerx-v${VERSION}-aarch64-apple-darwin.tar.gz\"" \
            "      sha256 \"${SHA_MACOS_ARM}\"" \
            '    end' \
            '    on_intel do' \
            "      url \"${BASE_URL}/wranglerx-v${VERSION}-x86_64-apple-darwin.tar.gz\"" \
            "      sha256 \"${SHA_MACOS_X86}\"" \
            '    end' \
            '  end' \
            '' \
            '  on_linux do' \
            '    on_arm do' \
            "      url \"${BASE_URL}/wranglerx-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz\"" \
            "      sha256 \"${SHA_LINUX_ARM}\"" \
            '    end' \
            '    on_intel do' \
            "      url \"${BASE_URL}/wranglerx-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz\"" \
            "      sha256 \"${SHA_LINUX_X86}\"" \
            '    end' \
            '  end' \
            '' \
            '  def install' \
            '    bin.install "wranglerx"' \
            '  end' \
            '' \
            '  test do' \
            '    assert_match version.to_s, shell_output("#{bin}/wranglerx version 2>&1")' \
            '  end' \
            'end' > homebrew-tap/Formula/wranglerx.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wranglerx.rb
          git diff --cached --quiet || (git commit -m "wranglerx ${VERSION}" && git push)
