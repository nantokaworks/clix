name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ghx-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ghx
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../ghx-${{ github.ref_name }}-${{ matrix.target }}.zip ghx.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghx-${{ matrix.target }}
          path: ghx-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Compute SHA256
        id: sha
        run: |
          cd artifacts
          for f in ghx-*; do
            sha256sum "$f"
          done | tee ../checksums.txt

          echo "sha_macos_arm=$(sha256sum ghx-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_macos_x86=$(sha256sum ghx-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_arm=$(sha256sum ghx-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x86=$(sha256sum ghx-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_windows_x86=$(sha256sum ghx-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
            checksums.txt

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ichi0g0y/homebrew-tap.git" homebrew-tap
          mkdir -p homebrew-tap/Formula

          cat > homebrew-tap/Formula/ghx.rb <<'FORMULA'
class Ghx < Formula
  desc "A thin wrapper around gh for multi-account GitHub usage"
  homepage "https://github.com/ichi0g0y/ghx"
  license "MIT"

  on_macos do
    on_arm do
      url "PLACEHOLDER_URL_MACOS_ARM"
      sha256 "PLACEHOLDER_SHA_MACOS_ARM"
    end
    on_intel do
      url "PLACEHOLDER_URL_MACOS_X86"
      sha256 "PLACEHOLDER_SHA_MACOS_X86"
    end
  end

  on_linux do
    on_arm do
      url "PLACEHOLDER_URL_LINUX_ARM"
      sha256 "PLACEHOLDER_SHA_LINUX_ARM"
    end
    on_intel do
      url "PLACEHOLDER_URL_LINUX_X86"
      sha256 "PLACEHOLDER_SHA_LINUX_X86"
    end
  end

  def install
    bin.install "ghx"
  end

  test do
    assert_match version.to_s, shell_output("#{bin}/ghx version 2>&1", 1)
  end
end
FORMULA

          sed -i "s|PLACEHOLDER_URL_MACOS_ARM|https://github.com/ichi0g0y/ghx/releases/download/${TAG}/ghx-${TAG}-aarch64-apple-darwin.tar.gz|" homebrew-tap/Formula/ghx.rb
          sed -i "s|PLACEHOLDER_SHA_MACOS_ARM|${{ steps.sha.outputs.sha_macos_arm }}|" homebrew-tap/Formula/ghx.rb
          sed -i "s|PLACEHOLDER_URL_MACOS_X86|https://github.com/ichi0g0y/ghx/releases/download/${TAG}/ghx-${TAG}-x86_64-apple-darwin.tar.gz|" homebrew-tap/Formula/ghx.rb
          sed -i "s|PLACEHOLDER_SHA_MACOS_X86|${{ steps.sha.outputs.sha_macos_x86 }}|" homebrew-tap/Formula/ghx.rb
          sed -i "s|PLACEHOLDER_URL_LINUX_ARM|https://github.com/ichi0g0y/ghx/releases/download/${TAG}/ghx-${TAG}-aarch64-unknown-linux-gnu.tar.gz|" homebrew-tap/Formula/ghx.rb
          sed -i "s|PLACEHOLDER_SHA_LINUX_ARM|${{ steps.sha.outputs.sha_linux_arm }}|" homebrew-tap/Formula/ghx.rb
          sed -i "s|PLACEHOLDER_URL_LINUX_X86|https://github.com/ichi0g0y/ghx/releases/download/${TAG}/ghx-${TAG}-x86_64-unknown-linux-gnu.tar.gz|" homebrew-tap/Formula/ghx.rb
          sed -i "s|PLACEHOLDER_SHA_LINUX_X86|${{ steps.sha.outputs.sha_linux_x86 }}|" homebrew-tap/Formula/ghx.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ghx.rb
          git diff --cached --quiet || (git commit -m "ghx ${VERSION}" && git push)

